<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D0D0D">
<title>Athlete Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif}
[data-theme="dark"]{--bg0:#0D0D0D;--bg1:#111;--bg2:#181818;--bg3:#1E1E1E;--t0:#E0E0E0;--t1:#C0C0C0;--t2:#888;--t3:#555;--t4:#333;--bd:#1A1A1A;--bd2:#222;color-scheme:dark}
[data-theme="light"]{--bg0:#F5F5F5;--bg1:#FFF;--bg2:#F0F0F0;--bg3:#E8E8E8;--t0:#111;--t1:#333;--t2:#666;--t3:#999;--t4:#BBB;--bd:#E0E0E0;--bd2:#D0D0D0;color-scheme:light}
:root{--ac:#F07020;--ac-d:#1A1000;--ac-b:#2A1800;--go:#D09020;--go-d:#1A1400;--bl:#3870C0;--bl-d:#0A1428;--gr:#30A030;--gr-d:#0A1A0A;--am:#E8A020;--re:#C03020;--pu:#7030A0;--pu-d:#1A0A28}
html,body{background:var(--bg0)}
.app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;overflow:hidden;position:relative;background:var(--bg0)}
/* TOPBAR */
.topbar{background:var(--bg1);padding:env(safe-area-inset-top,10px) 14px 8px;border-bottom:0.5px solid var(--bd);flex-shrink:0}
.tb-r1{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.tb-name{font-size:14px;font-weight:700;color:var(--t0)}.tb-ov{font-size:14px;font-weight:700;color:var(--go)}
.tb-right{display:flex;align-items:center;gap:6px}
.sync-badge{display:flex;align-items:center;gap:3px;background:var(--bg2);border-radius:10px;padding:2px 7px;font-size:9px;font-weight:700;color:var(--t3)}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--gr)}.sync-dot.sy{background:var(--am)}.sync-dot.of{background:var(--t3)}
.tb-gear{font-size:18px;cursor:pointer;color:var(--t3);line-height:1}
.week-nav{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-radius:7px;padding:5px 10px;margin-bottom:5px}
.wn-arr{font-size:18px;color:var(--ac);font-weight:700;cursor:pointer;line-height:1;padding:0 3px;user-select:none}
.wn-c{text-align:center}.wn-week{font-size:12px;font-weight:700;color:var(--t0)}.wn-dates{font-size:9px;color:var(--t3);margin-top:1px}
.wn-deload{font-size:9px;color:var(--am);font-weight:700;margin-top:1px;display:none}
.week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 0 5px}
.ws-day{border-radius:5px;padding:4px 2px;text-align:center;cursor:pointer;border:0.5px solid transparent}
.ws-day.done{background:var(--gr-d);border-color:#1A2A1A}.ws-day.pr{background:var(--go-d);border-color:#3A2A00}.ws-day.cur{border-color:var(--ac);background:var(--ac-d)}.ws-day.fut{opacity:.22}
.wsd-l{font-size:8px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px}
.ws-day.done .wsd-l{color:var(--gr)}.ws-day.pr .wsd-l{color:var(--go)}.ws-day.cur .wsd-l{color:var(--ac)}
.wsd-dots{display:flex;justify-content:center;gap:2px}.wd{width:4px;height:4px;border-radius:50%;background:var(--bg3)}.wd.g{background:var(--gr)}.wd.o{background:var(--ac)}.wd.go{background:var(--go)}
.tb-vol-row{display:flex;align-items:center;justify-content:space-between;margin-top:3px}
.tb-vol{font-size:10px;font-weight:700;color:var(--bl)}.tb-kcal{font-size:10px;font-weight:700;color:var(--am)}
.tb-alert{font-size:9px;font-weight:700;padding:1px 7px;border-radius:10px;background:var(--ac-d);color:var(--ac);border:0.5px solid var(--ac-b);margin-left:4px;display:none}
/* DAY BAR */
.day-bar{display:flex;gap:5px;padding:7px 14px;overflow-x:auto;scrollbar-width:none;background:var(--bg1);border-bottom:0.5px solid var(--bd);flex-shrink:0}
.day-bar::-webkit-scrollbar{display:none}
.day-chip{min-width:52px;padding:5px;border-radius:7px;border:0.5px solid var(--bd);background:var(--bg2);cursor:pointer;text-align:center;flex-shrink:0}
.day-chip.active{border-color:var(--ac);background:var(--ac-d)}
.dc-day{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:1px}.dc-name{font-size:10px;font-weight:600;color:var(--t3)}
.day-chip.active .dc-day{color:var(--ac)}.day-chip.active .dc-name{color:var(--t0)}
/* CONTENT */
.cw{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:65px}
.cw::-webkit-scrollbar{display:none}.content{padding:10px 14px}
/* EXO ROWS */
.exo-row{background:var(--bg1);border:0.5px solid var(--bd);border-radius:8px;margin-bottom:4px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.exo-row.done{opacity:.4}.exo-row.cur{border-color:var(--ac);background:var(--ac-d)}
.er-name{font-size:13px;font-weight:600;color:var(--t0)}.er-meta{font-size:10px;color:var(--t3);margin-top:2px}
.er-meta .rec{color:var(--t1)}.er-meta .smart{color:var(--gr);font-weight:700}.er-meta .plateau{color:var(--am);font-weight:700}.er-meta .deload{color:var(--am)}
.er-r{display:flex;align-items:center;gap:5px;flex-shrink:0}
.pr-dot{width:7px;height:7px;border-radius:50%;background:var(--ac)}
.dots{display:flex;gap:3px}.dot{width:6px;height:6px;border-radius:50%;background:var(--bg3)}.dot.done{background:var(--gr)}.dot.cur{background:var(--ac)}
.tag-b{font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;background:var(--ac-d);color:var(--ac);border:0.5px solid var(--ac-b)}
.tag-bloc{font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;background:var(--bl-d);color:var(--bl);border:0.5px solid #1A2440}
/* SECTION HEADERS */
.section-hdr{display:flex;align-items:center;gap:8px;padding:8px 0 6px;cursor:pointer}
.sh-icon{font-size:14px}.sh-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;flex:1}
.sh-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px}
.sh-badge.gainage{background:var(--bl-d);color:var(--bl);border:0.5px solid #1A2440}
.sh-badge.abdos{background:var(--pu-d);color:var(--pu);border:0.5px solid #2A1440}
.sh-badge.cardio{background:#1A1200;color:var(--am);border:0.5px solid #3A2800}
.sh-toggle{font-size:12px;color:var(--t3)}
.section-body{overflow:hidden}
/* GAINAGE ROW */
.gainage-row{background:var(--bg1);border:0.5px solid #1A2440;border-radius:8px;padding:10px 12px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.gainage-row.done{opacity:.4}
.gr-left .gr-name{font-size:13px;font-weight:600;color:var(--bl)}.gr-left .gr-sub{font-size:10px;color:var(--t3);margin-top:2px}
.gr-right{display:flex;align-items:center;gap:6px}
.gr-prog{font-size:11px;font-weight:700;color:var(--bl)}
/* CARDIO ROW */
.cardio-block{background:var(--bg1);border:0.5px solid #3A2800;border-radius:8px;padding:10px 12px;margin-bottom:4px}
.cb-title{font-size:10px;font-weight:700;color:var(--am);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.cb-preset{font-size:10px;color:var(--t3);margin-bottom:7px}
.cb-row{display:flex;gap:5px;margin-bottom:5px}
.cb-btn{flex:1;padding:7px 3px;background:var(--bg2);border:0.5px solid var(--bd);border-radius:6px;font-size:10px;font-weight:700;color:var(--t3);cursor:pointer;text-align:center}
.cb-btn.on{background:#1A1200;border-color:var(--am);color:var(--am)}
.cb-row2{display:flex;gap:5px;align-items:center}
.cb-in{background:var(--bg2);border:0.5px solid var(--bd2);border-radius:6px;padding:7px;font-size:14px;font-weight:700;color:var(--t0);text-align:center;width:60px;-moz-appearance:textfield}
.cb-in::-webkit-outer-spin-button,.cb-in::-webkit-inner-spin-button{-webkit-appearance:none}
.cb-save{flex:1;padding:7px;background:#1A1200;border:0.5px solid var(--am);border-radius:6px;font-size:11px;font-weight:700;color:var(--am);cursor:pointer;text-align:center}
.cb-saved{font-size:10px;color:var(--gr);margin-top:4px;font-weight:600}
/* SCORE */
.score-row{background:var(--bg1);border:0.5px solid var(--bd);border-radius:8px;padding:8px 12px;margin-top:5px;display:flex;align-items:center;justify-content:space-between}
.sr-score{font-size:17px;font-weight:700;color:var(--go)}.sr-vs{font-size:9px;color:var(--gr);font-weight:600;margin-top:1px}.sr-formula{font-size:9px;color:var(--t4);font-style:italic;margin-top:2px}
.sr-label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:2px}
.sr-time{font-size:13px;font-weight:700;color:var(--ac)}.sr-kcal{font-size:10px;color:var(--am);font-weight:700;margin-top:2px}
.end-btn{width:100%;margin-top:6px;padding:12px;background:var(--ac-d);border:0.5px solid var(--ac);border-radius:8px;font-size:12px;font-weight:700;color:var(--ac);cursor:pointer;text-transform:uppercase;letter-spacing:.03em}
/* FOCUS */
.focus-screen,.hist-screen,.end-screen,.settings-screen,.gainage-screen,.mobilite-screen{display:none;flex-direction:column;height:100vh;background:var(--bg0);position:absolute;inset:0}
.focus-screen.on,.hist-screen.on,.end-screen.on,.settings-screen.on,.gainage-screen.on,.mobilite-screen.on{display:flex}
.end-screen{z-index:70;overflow-y:auto}.settings-screen{z-index:80}.gainage-screen{z-index:60}.mobilite-screen{z-index:60}
.f-top{background:var(--bg1);padding:env(safe-area-inset-top,10px) 14px 9px;border-bottom:0.5px solid var(--bd);flex-shrink:0;display:flex;align-items:center;gap:9px}
.f-back{font-size:22px;color:var(--ac);font-weight:700;cursor:pointer;line-height:1;flex-shrink:0}
.f-title{font-size:13px;font-weight:700;color:var(--t0);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.f-tag{font-size:8px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0;display:none}
.f-nav{display:flex;align-items:center;justify-content:space-between;padding:5px 14px;background:var(--bg1);border-bottom:0.5px solid var(--bd);flex-shrink:0}
.f-nl,.f-nr{font-size:10px;color:var(--t3)}.f-nl span,.f-nr span{color:var(--ac)}.f-npos{font-size:10px;color:var(--t3)}
.f-recbar{background:var(--ac-d);border-bottom:0.5px solid var(--ac-b);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;cursor:pointer}
.f-rl{font-size:8px;font-weight:700;color:#3A2010;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.f-rv{font-size:34px;font-weight:700;color:var(--ac);line-height:1;letter-spacing:-.02em}.f-rv small{font-size:14px;color:var(--t3);font-weight:400}
.f-rec-orm{font-size:10px;color:var(--bl);margin-top:3px}.f-rec-tap{font-size:8px;color:var(--t4);font-style:italic;margin-top:2px}
.f-next-l{font-size:9px;color:var(--t3);text-align:right;margin-bottom:2px}.f-next-v{font-size:16px;font-weight:700;color:var(--go);text-align:right}
.f-smart{font-size:10px;font-weight:700;color:var(--gr);text-align:right;margin-top:2px}.f-deload-b{font-size:9px;font-weight:700;color:var(--am);text-align:right;margin-top:2px}
.f-body{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.f-body::-webkit-scrollbar{display:none}
.f-sw{padding:12px 14px 0}
.f-dots-row{display:flex;justify-content:center;gap:7px;margin-bottom:10px}
.f-dot{width:9px;height:9px;border-radius:50%;background:var(--bg3)}.f-dot.done{background:var(--gr)}.f-dot.cur{background:var(--ac);transform:scale(1.3)}
.f-sl{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;text-align:center;margin-bottom:2px}
.f-sl.top{color:var(--ac)}.f-sl.bo{color:var(--bl)}.f-sl.iso,.f-sl.bloc{color:var(--t2)}
.f-sr{font-size:10px;color:var(--t3);text-align:center;margin-bottom:10px}
.f-hint{text-align:center;font-size:11px;margin-bottom:8px}.f-hint.prev{color:var(--t4);font-style:italic}.f-hint.smart{color:var(--gr);font-weight:700}
.f-inputs{display:flex;gap:10px;margin-bottom:9px}
.f-ig{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.f-il{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em}
.f-in{background:var(--bg2);border:0.5px solid var(--bd2);border-radius:10px;padding:14px 5px;font-size:28px;font-weight:700;text-align:center;width:100%;color:var(--t0);-moz-appearance:textfield}
.f-in::-webkit-outer-spin-button,.f-in::-webkit-inner-spin-button{-webkit-appearance:none}
.f-in:focus{outline:none;border-color:var(--ac);background:var(--ac-d);color:var(--ac)}
.f-in.top-in{border-color:var(--ac-b);background:var(--ac-d);color:var(--ac)}.f-in.pr-in{border-color:var(--ac);color:var(--ac)}.f-in.done-in{background:var(--bg1);border-color:var(--bd);color:var(--t4)}.f-in.dl-in{border-color:#3A2800;background:#1A1200;color:var(--am)}
.f-orm{font-size:9px;color:var(--bl);text-align:center;font-weight:600;height:14px}
.f-status{text-align:center;min-height:28px;margin-bottom:4px}
.f-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:5px 13px;border-radius:12px}
.fb-pr{background:var(--ac-d);color:var(--ac);border:0.5px solid var(--ac-b)}.fb-ok{background:var(--gr-d);color:var(--gr)}
.f-prog{text-align:center;font-size:11px;color:var(--gr);font-weight:700;min-height:18px;margin-bottom:4px}
.f-note-wrap{padding:0 14px 10px}
.f-note{width:100%;background:var(--bg2);border:0.5px solid var(--bd2);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--t2);resize:none;min-height:38px;font-family:inherit}
.f-note:focus{outline:none;border-color:var(--ac);color:var(--t0)}
/* BLOC */
.f-bloc-hdr{background:var(--ac-d);border-bottom:0.5px solid var(--ac-b);padding:9px 14px;flex-shrink:0}
.fbh-title{font-size:10px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1px}.fbh-sub{font-size:9px;color:var(--t3)}
.fbh-row{display:flex;align-items:center;justify-content:space-between;margin-top:7px}
.fbh-kg-l{font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.fbh-kg-in{background:var(--ac-d);border:0.5px solid var(--ac-b);border-radius:7px;padding:6px 8px;font-size:18px;font-weight:700;color:var(--ac);text-align:center;width:80px;-moz-appearance:textfield}
.fbh-kg-in::-webkit-outer-spin-button,.fbh-kg-in::-webkit-inner-spin-button{-webkit-appearance:none}
.fbh-t-l{font-size:9px;color:var(--t3)}.fbh-t{font-size:14px;font-weight:700;color:var(--bl)}.fbh-vs{font-size:9px;color:var(--gr);font-weight:600;margin-top:1px}
.f-bloc-series{padding:8px 14px 0}
.fbs-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;padding:7px 9px;border-radius:8px;background:var(--bg1);border:0.5px solid var(--bd)}
.fbs-row.active{background:var(--ac-d);border-color:var(--ac)}.fbs-row.done{opacity:.5}
.fbs-l{font-size:10px;font-weight:700;color:var(--t3);min-width:18px}.fbs-row.active .fbs-l{color:var(--ac)}
.fbs-in{background:var(--bg2);border:0.5px solid var(--bd2);border-radius:6px;padding:8px 3px;font-size:18px;font-weight:700;text-align:center;width:54px;color:var(--t0);-moz-appearance:textfield}
.fbs-in::-webkit-outer-spin-button,.fbs-in::-webkit-inner-spin-button{-webkit-appearance:none}
.fbs-row.active .fbs-in{border-color:var(--ac-b);color:var(--ac);background:var(--ac-d)}.fbs-row.done .fbs-in{color:var(--t4);border-color:var(--bd)}
.fbs-zone{font-size:9px;color:var(--t3);font-style:italic;flex:1}
.fbs-ic{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.ic-ok{background:var(--gr-d);color:var(--gr)}.ic-e{background:var(--bg2);color:var(--t4)}
.f-bloc-reco{margin:7px 14px 0;border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px}
.fbr-ok{background:var(--gr-d);border:0.5px solid #1A3A1A}.fbr-up{background:var(--ac-d);border:0.5px solid var(--ac-b)}.fbr-down{background:#1A0A0A;border:0.5px solid #3A1010}
.fbr-t{font-size:11px;font-weight:700}.fbr-ok .fbr-t{color:var(--gr)}.fbr-up .fbr-t{color:var(--ac)}.fbr-down .fbr-t{color:var(--re)}
.fbr-s{font-size:9px;color:var(--t3);margin-top:1px}
/* GAINAGE SCREEN */
.g-top{background:var(--bg1);padding:env(safe-area-inset-top,10px) 14px 9px;border-bottom:0.5px solid var(--bd);flex-shrink:0;display:flex;align-items:center;gap:9px}
.g-body{flex:1;overflow-y:auto;padding:12px 14px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.g-body::-webkit-scrollbar{display:none}
.g-phase{text-align:center;margin-bottom:14px}
.g-phase-label{font-size:10px;font-weight:700;color:var(--bl);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.g-exo-name{font-size:18px;font-weight:700;color:var(--t0);margin-bottom:2px}
.g-exo-sub{font-size:11px;color:var(--t3);margin-bottom:10px}
/* Cercle gainage */
.g-circle-wrap{display:flex;justify-content:center;margin-bottom:12px;position:relative;width:110px;height:110px;margin:0 auto 12px}
.g-svg{transform:rotate(-90deg);width:110px;height:110px}
.g-bg{fill:none;stroke:var(--bg3);stroke-width:9}
.g-fill{fill:none;stroke:var(--bl);stroke-width:9;stroke-linecap:round;stroke-dasharray:329;stroke-dashoffset:329;transition:stroke-dashoffset .5s linear,stroke .3s}
.g-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.g-time{font-size:32px;font-weight:700;color:var(--bl);line-height:1;font-variant-numeric:tabular-nums;transition:color .3s}
.g-time.warn{color:var(--am)}.g-time.go{color:var(--gr)}.g-time.rest{color:var(--gr)}
.g-time-l{font-size:8px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.g-tip{background:var(--bl-d);border:0.5px solid #1A2440;border-radius:8px;padding:8px 10px;margin-bottom:10px}
.g-tip-l{font-size:8px;font-weight:700;color:var(--bl);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.g-tip-t{font-size:10px;color:#6090C0;line-height:1.5}
.g-series{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.g-serie-row{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:7px;background:var(--bg1);border:0.5px solid var(--bd)}
.g-serie-row.active{background:var(--bl-d);border-color:var(--bl)}.g-serie-row.done{opacity:.45}.g-serie-row.rest{background:#0A1A0A;border-color:#1A3A1A}
.g-sn{font-size:9px;font-weight:700;color:var(--t3);min-width:30px;text-transform:uppercase}.g-serie-row.active .g-sn{color:var(--bl)}.g-serie-row.rest .g-sn{color:var(--gr)}

    <div class="fc-top"><span class="fc-label">Repos en cours</span><div class="fc-ths" id="fc-ths"><span class="fc-th th-g">90s</span><span class="fc-th th-a">2min</span><span class="fc-th th-w">3min+</span></div></div>
    <div class="fc-seg" id="fc-seg"><div class="fc-s" id="fcs0"></div><div class="fc-s" id="fcs1"></div><div class="fc-s" id="fcs2"></div><div class="fc-s" id="fcs3"></div><div class="fc-s" id="fcs4"></div><div class="fc-s" id="fcs5"></div></div>
    <div class="fc-main"><div class="fc-time g" id="fc-time">0:00</div><div class="fc-r"><div class="fc-next" id="fc-next">—</div><div class="fc-hint">Pars quand tu es prêt</div></div></div>
    <button class="fc-btn" id="fc-btn" onclick="advanceSerie()">—</button>
  </div>
</div>
<!-- GAINAGE -->
<div class="gainage-screen" id="gainage-screen">
  <div class="g-top"><div class="f-back" onclick="closeGainage()">←</div><div class="f-title">Gainage — 8 min</div></div>
  <div class="g-body" id="g-body"></div>
</div>
<!-- MOBILITE -->
<div class="mobilite-screen" id="mobilite-screen">
  <div class="g-top"><div class="f-back" onclick="closeMobilite()">←</div><div class="f-title">🧘 Mobilité — ~22 min</div></div>
  <div class="g-body" id="m-body"></div>
</div>
<!-- HISTORY -->
<div class="hist-screen" id="hist-screen">
  <div class="f-top"><div class="f-back" onclick="closeHist()">←</div><div class="f-title" id="hist-name">—</div></div>
  <div class="hist-body" id="hist-body"></div>
</div>
<!-- END -->
<div class="end-screen" id="end-screen">
  <div class="end-top"><div class="end-title">Séance terminée</div><div class="end-sub" id="end-sub">—</div></div>
  <div id="end-body"></div>
</div>
<!-- SETTINGS -->
<div class="settings-screen" id="settings-screen">
  <div class="settings-top"><div class="f-back" onclick="closeSettings()">←</div><div class="f-title">Paramètres</div></div>
  <div class="settings-body" id="settings-body"></div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="program.js"></script>
<script src="app.js"></script>
</body>
